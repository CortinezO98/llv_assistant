version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: llv_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-llv_root_2024}
      MYSQL_DATABASE: ${DB_NAME:-llv_assistant}
      MYSQL_USER: ${DB_USER:-llv_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-llv_password}
    ports:
      - "3308:3306"
    volumes:
      - llv_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llv_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llv_frontend
    restart: unless-stopped
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8001

volumes:
  llv_mysql_data: